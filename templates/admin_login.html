<!DOCTYPE html>
<html>

<head>

<title>AgentFlow AI - Admin Login</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}



body{

height:100vh;
background:#020617;

display:flex;
justify-content:center;
align-items:center;

color:white;

}





.login-box{

width:420px;

background:#1e293b;

padding:40px;

border-radius:25px;

box-shadow:0 20px 40px #0008;

text-align:center;

}





.logo{

font-size:55px;

margin-bottom:20px;

}




h1{

color:#38bdf8;

margin-bottom:10px;

}



.subtitle{

color:#94a3b8;

margin-bottom:30px;

}





input{

width:100%;

padding:15px;

margin:12px 0;

border:none;

outline:none;

border-radius:12px;

background:#0f172a;

color:white;

font-size:16px;

}




button{


width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

}




button:hover{

background:#1d4ed8;

}




.info{

margin-top:25px;

background:#0f172a;

padding:15px;

border-radius:15px;

color:#cbd5e1;

font-size:14px;

}





.back{

display:block;

margin-top:20px;

color:#38bdf8;

text-decoration:none;

}



</style>


</head>


<body>




<div class="login-box">



<div class="logo">

🤖

</div>



<h1>

AgentFlow AI

</h1>



<div class="subtitle">

Admin Control Panel Login

</div>





<form method="POST">



<input

type="text"

name="username"

placeholder="Admin Username"

required>



<input

type="password"

name="password"

placeholder="Password"

required>



<button>

🔐 Login

</button>



</form>






<div class="info">


Demo Login

<br><br>

Username : admin

<br>

Password : 1234


</div>



<a class="back" href="/">

⬅ Back Home

</a>




</div>



</body>


</html>
