<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{

background:#0f172a;
color:white;
font-family:Segoe UI;
}


.box{

width:350px;
margin:100px auto;
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;

}


input{

width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;

}


button{

background:#2563eb;
color:white;
padding:12px 30px;
border:none;
border-radius:8px;

}

</style>

</head>


<body>


<div class="box">


<h1>🔐 Admin Login</h1>


<form method="POST">


<input 
type="text"
name="username"
placeholder="Username">


<input
type="password"
name="password"
placeholder="Password">


<button>
Login
</button>


</form>


</div>


</body>

</html>
