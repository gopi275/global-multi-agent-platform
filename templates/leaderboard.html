<!DOCTYPE html>
<html>

<head>

<title>Agent Leaderboard</title>


<style>

body{

background:#0f172a;
color:white;
font-family:Segoe UI;
padding:30px;

}


.container{

max-width:1000px;
margin:auto;

}


h1{

text-align:center;

}


.back{

background:#22c55e;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:8px;

}



table{

width:100%;
margin-top:30px;
border-collapse:collapse;
background:#1e293b;
border-radius:12px;
overflow:hidden;

}



th{

background:#334155;
padding:15px;

}


td{

padding:15px;
text-align:center;
border-bottom:1px solid #475569;

}



.rank{

font-size:25px;

}



.agent{

color:#38bdf8;
font-weight:bold;

}



</style>


</head>


<body>


<div class="container">


<a class="back" href="/admin/">

⬅ Dashboard

</a>



<h1>
🏆 AI Agent Leaderboard
</h1>



<table>


<tr>

<th>
Rank
</th>


<th>
Agent Name
</th>


<th>
Completed Tasks
</th>


<th>
Accuracy
</th>


</tr>



{% for agent in agents %}


<tr>


<td class="rank">

{% if agent.rank == 1 %}

🥇

{% elif agent.rank == 2 %}

🥈

{% elif agent.rank == 3 %}

🥉

{% else %}

🏅

{% endif %}


</td>



<td class="agent">

{{agent.name}}

</td>



<td>

{{agent.tasks}}

</td>



<td>

{{agent.accuracy}}

</td>



</tr>



{% endfor %}



</table>



</div>


</body>


</html>
