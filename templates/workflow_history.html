<!DOCTYPE html>
<html>

<head>

<title>Workflow History</title>

<style>

body{
    background:#020617;
    color:white;
    font-family:Segoe UI;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}


h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:30px;
}


.card{

    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;

}


.status{

    background:#166534;
    color:#86efac;
    padding:8px 15px;
    border-radius:20px;

}


.agent{

    background:#0f172a;
    padding:15px;
    margin-top:15px;
    border-radius:15px;

}


.back{

    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;

}


</style>

</head>


<body>


<div class="container">


<h1>
📜 Workflow Execution History
</h1>



{% for item in history %}


<div class="card">


<h2>
{{item.workflow_name}}
</h2>


<p>
Task : {{item.task}}
</p>


<br>


<span class="status">

{{item.status}}

</span>



<h3 style="margin-top:20px;">
Agents
</h3>


{% for agent in item.agents %}


<div class="agent">


<b>
{{agent.agent}}
</b>

<br><br>


Status :
{{agent.status}}


<br>


Output :
{{agent.output}}


</div>


{% endfor %}



</div>



{% endfor %}



<a class="back" href="/admin/dashboard">
⬅ Back Dashboard
</a>


</div>


</body>

</html>
