<!DOCTYPE html>
<html>

<head>

<title>AgentFlow AI - System Reports</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}


body{

background:#020617;
color:white;
padding:30px;

}


.container{

max-width:1200px;
margin:auto;

}


h1{

text-align:center;
margin-bottom:35px;

}



/* Cards */


.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}



.card{

background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px #0005;

}



.card h3{

color:#94a3b8;

}



.card h2{

margin-top:15px;
font-size:35px;
color:#38bdf8;

}





.section{

margin-top:40px;
background:#1e293b;
padding:30px;
border-radius:25px;

}





canvas{

max-height:350px;

}




.buttons{

margin-top:30px;
text-align:center;

}




.btn{

display:inline-block;

background:#2563eb;

padding:13px 30px;

border-radius:12px;

color:white;

text-decoration:none;

margin:10px;

}



.btn:hover{

background:#1d4ed8;

}



.green{

background:#16a34a;

}



</style>


</head>



<body>



<div class="container">



<h1>

📊 AI System Analytics Report

</h1>




<div class="cards">



<div class="card">

<h3>
👥 Total Users
</h3>

<h2>
{{data.users}}
</h2>

</div>





<div class="card">

<h3>
📋 Total Tasks
</h3>

<h2>
{{data.tasks}}
</h2>

</div>





<div class="card">

<h3>
⚙️ Workflows
</h3>

<h2>
{{data.workflows}}
</h2>

</div>





<div class="card">

<h3>
🧠 AI Decisions
</h3>

<h2>
{{data.ai_logs}}
</h2>

</div>



</div>







<div class="section">


<h2>
📈 System Performance Chart
</h2>


<br>


<canvas id="reportChart"></canvas>



</div>







<div class="buttons">



<a class="btn green"
href="/admin/generate-ai-report">

➕ Generate AI Report

</a>



<a class="btn"
href="/admin/download-report">

📄 Download PDF

</a>



<a class="btn"
href="/admin">

⬅ Dashboard

</a>



</div>




</div>







<script>


const ctx =
document.getElementById(
'reportChart'
);



new Chart(ctx,{


type:'bar',


data:{


labels:[

"Users",

"Tasks",

"Workflows",

"AI Decisions"

],


datasets:[{


label:"System Statistics",


data:[


{{data.users}},

{{data.tasks}},

{{data.workflows}},

{{data.ai_logs}}


]

}]


},


options:{


responsive:true,


scales:{


y:{


beginAtZero:true


}


}


}



});



</script>



</body>


</html>
