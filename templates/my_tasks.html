<!DOCTYPE html>
<html>

<head>

<title>My Tasks</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:12px;
}

</style>

</head>


<body>


<h1>📋 My Tasks</h1>


{% for task in tasks %}


<div class="card">

<h2>{{task.task_name}}</h2>

<p>🤖 Agent : {{task.agent_name}}</p>

<p>⭐ Priority : {{task.priority}}</p>

<p>📅 Due Date : {{task.due_date}}</p>

<p>📌 Status : {{task.status}}</p>


</div>


{% else %}


<h2>No Tasks Found</h2>


{% endfor %}


</body>

</html>
