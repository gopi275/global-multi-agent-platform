<!DOCTYPE html>
<html>

<head>

<title>Admin Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    padding:30px;

}


.container{

    max-width:1000px;
    margin:auto;

}


h1{

    text-align:center;
    margin-bottom:40px;

}


.card{

    background:#1e293b;
    padding:30px;
    border-radius:15px;

}


.stats{

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;

}


.box{

    background:#334155;
    padding:20px;
    text-align:center;
    border-radius:10px;

}


.number{

    font-size:30px;
    font-weight:bold;

}


a{

    color:white;
    text-decoration:none;

}


button{

    margin-top:30px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;

}


</style>

</head>


<body>


<div class="container">


<h1>
📊 Admin Analytics Dashboard
</h1>



<div class="stats">


<div class="box">

<h3>Users</h3>

<div class="number">

{{ data.users }}

</div>

</div>



<div class="box">

<h3>Tasks</h3>

<div class="number">

{{ data.tasks }}

</div>

</div>



<div class="box">

<h3>Reports</h3>

<div class="number">

{{ data.reports }}

</div>

</div>



<div class="box">

<h3>Workflows</h3>

<div class="number">

{{ data.workflows }}

</div>

</div>


</div>




<div class="card">


<canvas id="chart"></canvas>


</div>




<a href="/admin">

<button>

⬅ Back To Dashboard

</button>

</a>



</div>

<script>

const chart = document.getElementById("chart");


new Chart(chart, {

    type: "bar",

    data: {

        labels: [
            "Users",
            "Tasks",
            "Reports",
            "Workflows"
        ],

        datasets: [
            {
                label: "System Statistics",

                data: [
                    {{ data.users }},
                    {{ data.tasks }},
                    {{ data.reports }},
                    {{ data.workflows }}
                ]
            }
        ]

    },


    options: {

        responsive: true,

        scales: {

            y: {

                beginAtZero: true

            }

        }

    }

});


</script>
