<!DOCTYPE html>
<html>
<head>

<title>Activity Logs</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:30px;
}

h1{
    text-align:center;
}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:30px;

    background:#1e293b;
}

th,td{

    border:1px solid #334155;

    padding:15px;

    text-align:center;
}

th{
    background:#2563eb;
}

.btn{

    margin-top:20px;

    padding:10px 20px;

    background:#2563eb;

    border:none;

    border-radius:8px;

    color:white;
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<h1>📝 Activity Logs</h1>

<table>

<tr>

<th>ID</th>
<th>Activity</th>

</tr>

{% for log in logs %}

<tr>

<td>{{ log._id }}</td>

<td>{{ log.activity }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">

<button class="btn">
⬅ Dashboard
</button>

</a>

</body>
</html>
