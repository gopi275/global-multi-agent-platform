<!DOCTYPE html>
<html>

<head>

<title>User Management</title>


<style>

body{

background:#0f172a;
color:white;
font-family:Segoe UI;
padding:30px;

}


.container{

max-width:1000px;
margin:auto;

}


h1{

text-align:center;

}



table{

width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;

}



th{

background:#334155;
padding:15px;

}


td{

padding:15px;
text-align:center;
border-bottom:1px solid #475569;

}



.delete{

background:#ef4444;
color:white;
padding:8px 15px;
border-radius:8px;
text-decoration:none;

}


.delete:hover{

background:#dc2626;

}



.back{

display:inline-block;
margin-bottom:20px;
background:#22c55e;
padding:10px 20px;
color:white;
text-decoration:none;
border-radius:8px;

}


</style>


</head>


<body>


<div class="container">


<a class="back" href="/admin/">
⬅ Back Dashboard
</a>


<h1>
👥 Manage Users
</h1>



<table>


<tr>

<th>
ID
</th>

<th>
Username
</th>

<th>
Email
</th>

<th>
Action
</th>


</tr>



{% for user in users %}


<tr>


<td>

{{user._id}}

</td>


<td>

{{user.username}}

</td>



<td>

{{user.email}}

</td>



<td>

<a class="delete"
href="/admin/delete-user/{{user._id}}">

Delete

</a>

</td>


</tr>


{% endfor %}



</table>



</div>


</body>


</html>
