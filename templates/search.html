<!DOCTYPE html>
<html>

<head>

<title>Global Search</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

form{
    display:flex;
    gap:10px;
    margin-bottom:30px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
}

button{
    padding:12px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.card{
    background:#1e293b;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
}

.back{
    color:white;
    text-decoration:none;
    display:inline-block;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<a href="/admin/" class="back">
⬅ Dashboard
</a>

<h1>🔍 Global Search</h1>

<form method="POST">

<input
type="text"
name="keyword"
placeholder="Search Users, Tasks, Workflows"
required>

<button type="submit">
Search
</button>

</form>

<div class="card">

<h2>👥 Users</h2>

{% for user in users %}
<p>
{{ user.username }} - {{ user.email }}
</p>
{% endfor %}

</div>

<div class="card">

<h2>📋 Tasks</h2>

{% for task in tasks %}
<p>
{{ task.task_name }}
</p>
{% endfor %}

</div>

<div class="card">

<h2>⚙️ Workflows</h2>

{% for workflow in workflows %}
<p>
{{ workflow.agent }}
</p>
{% endfor %}

</div>

</div>

</body>

</html>
