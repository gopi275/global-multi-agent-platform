<!DOCTYPE html>

<html>
<head>

<title>User Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Segoe UI;
}

.login-box{
width:400px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.links{
text-align:center;
margin-top:15px;
}

a{
text-decoration:none;
color:#2563eb;
}

</style>

</head>

<body>

<div class="login-box">

<h1>👤 User Login</h1>

<form action="/login" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="links">

<p>
Don't have an account?
<a href="/register">Register</a>
</p>

<p>
<a href="/">⬅ Back Home</a>
</p>

</div>

</div>

</body>
</html>
