<!DOCTYPE html>
<html>

<head>

<title>AgentFlow AI - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI';
}


body{

    height:100vh;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;

}


.login-box{

    width:380px;
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);

}


.logo{

    text-align:center;
    font-size:35px;
    margin-bottom:10px;

}


h2{

    text-align:center;
    margin-bottom:30px;
    color:#38bdf8;

}


.input-box{

    margin-bottom:20px;

}


label{

    display:block;
    margin-bottom:8px;

}


input{

    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:16px;

}


input:focus{

    outline:2px solid #38bdf8;

}


button{

    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;

}


button:hover{

    background:#38bdf8;
    color:black;

}


.footer{

    text-align:center;
    margin-top:20px;
    color:#94a3b8;

}


</style>


</head>


<body>


<div class="login-box">


<div class="logo">
🤖
</div>


<h2>
AgentFlow AI Login
</h2>



<form method="POST" action="/login">


<div class="input-box">

<label>
Username
</label>

<input 
type="text"
name="username"
placeholder="Enter username"
required>

</div>



<div class="input-box">

<label>
Password
</label>

<input 
type="password"
name="password"
placeholder="Enter password"
required>

</div>



<button type="submit">

Login

</button>


</form>

<p style="margin-top:15px;">
    Don't have an account?
    <a href="/register">Register Here</a>
</p>



<div class="footer">

AI Workflow Automation Platform

</div>



</div>


</body>

</html>
