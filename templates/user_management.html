<!DOCTYPE html>
<html>

<head>

<title>User Management</title>

<style>

body{
    background:#020617;
    color:white;
    font-family:Segoe UI, sans-serif;
    padding:30px;
}


.container{
    max-width:1200px;
    margin:auto;
}


h1{
    text-align:center;
    margin-bottom:35px;
}


.box{

    background:#1e293b;
    padding:25px;
    border-radius:20px;

}



table{

    width:100%;
    border-collapse:collapse;

}



th{

    background:#2563eb;
    padding:15px;

}



td{

    padding:15px;
    text-align:center;
    border-bottom:1px solid #334155;

}



.online{

    color:#22c55e;
    font-weight:bold;

}



.offline{

    color:#ef4444;
    font-weight:bold;

}



.delete{

    background:#dc2626;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    text-decoration:none;

}



.delete:hover{

    background:#b91c1c;

}



.back{

    display:inline-block;
    margin-top:25px;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:10px;

}


</style>


</head>


<body>


<div class="container">


<h1>
👥 User Management
</h1>



<div class="box">


<table>


<tr>

<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Last Login</th>
<th>Action</th>

</tr>



{% for user in users %}


<tr>


<td>
{{user.username}}
</td>


<td>
{{user.email}}
</td>


<td>
{{user.role}}
</td>



<td>

{% if user.status=="Online" %}

<span class="online">
🟢 Online
</span>

{% else %}

<span class="offline">
🔴 Offline
</span>

{% endif %}


</td>



<td>

{{user.last_login}}

</td>




<td>

<a class="delete"
href="/delete_user/{{user._id}}"
onclick="return confirm('Delete this user?')">

Delete

</a>

</td>


</tr>


{% endfor %}



</table>


</div>



<a class="back" href="/admin">

⬅ Back Admin

</a>



</div>


</body>

</html>
