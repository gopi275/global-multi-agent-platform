<!DOCTYPE html>
<html>

<head>

<title>Notifications</title>

<style>

body{

    background:#020617;
    color:white;
    font-family:Segoe UI, sans-serif;
    padding:30px;

}


.container{

    max-width:900px;
    margin:auto;

}


h1{

    text-align:center;
    margin-bottom:40px;

}



.notification{

    background:#1e293b;
    padding:20px;
    margin-bottom:15px;
    border-radius:15px;
    border-left:5px solid #38bdf8;

}



.message{

    font-size:18px;
    font-weight:500;

}



.time{

    margin-top:10px;
    color:#94a3b8;
    font-size:14px;

}



.back{

    display:inline-block;
    margin-top:30px;
    padding:12px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;

}



.empty{

    text-align:center;
    background:#1e293b;
    padding:30px;
    border-radius:15px;

}


</style>


</head>


<body>


<div class="container">


<h1>
🔔 Notifications
</h1>



{% if notifications %}


{% for note in notifications %}


<div class="notification">


<div class="message">

🔔 {{note.message}}

</div>


<div class="time">

🕒 {{note.time}}

</div>


</div>


{% endfor %}



{% else %}


<div class="empty">

<h3>
No Notifications Found
</h3>

<p>
Create tasks or complete workflow to generate notifications.
</p>

</div>


{% endif %}



<a class="back" href="/dashboard">

⬅ Back Dashboard

</a>



</div>


</body>


</html>
