<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

    body{
        background:#0f172a;
        color:white;
        font-family:Segoe UI;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        background:#1e293b;
        padding:30px;
        border-radius:15px;
        width:400px;
        text-align:center;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:none;
        border-radius:10px;
    }

    button{
        width:100%;
        padding:12px;
        background:#2563eb;
        color:white;
        border:none;
        border-radius:10px;
        cursor:pointer;
    }

    a{
        color:#38bdf8;
        text-decoration:none;
    }

    </style>

</head>
<body>

<div class="box">

    <h1>📝 Register</h1>

    <form method="POST" action="/register">

        <input
        type="text"
        name="username"
        placeholder="Username"
        required>

        <input
        type="email"
        name="email"
        placeholder="Email"
        required>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/">Already have an account? Login</a>

</div>

</body>
</html>
