<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>


<style>


button{

background:#2563eb;
color:white;
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;

}


button:hover{

transform:scale(1.05);

}

body{

    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    padding:30px;

}


.container{

    max-width:1200px;
    margin:auto;

}


h1{

    text-align:center;

}


.cards{

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:40px;

}


.card{

    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px black;

}


.card h2{

    font-size:40px;
    margin:10px;

}


.card p{

    font-size:18px;

}



.menu{

    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;

}



.menu a{

    text-decoration:none;
    color:white;
    background:#334155;
    padding:20px;
    border-radius:12px;
    text-align:center;
    font-size:18px;

}


.menu a:hover{

    background:#22c55e;

}



.logout{

    float:right;
    background:#ef4444;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    color:white;

}


</style>


</head>


<body>


<div class="container">


<a class="logout" href="/admin/logout">
Logout
</a>


<h1>
👨‍💼 Admin Dashboard
</h1>



<div class="cards">


<div class="card">

<h2>
{{data.users}}
</h2>

<p>
Total Users
</p>

</div>



<div class="card">

<h2>
{{data.tasks}}
</h2>

<p>
Total Tasks
</p>

</div>



<div class="card">

<h2>
{{data.reports}}
</h2>

<p>
Total Reports
</p>

</div>



<div class="card">

<h2>
{{data.workflows}}
</h2>

<p>
Total Workflows
</p>

</div>


</div>





<div class="menu">


<a href="/admin/users">
👥 Manage Users
</a>


<a href="/admin/workflows">
⚙ Workflow Monitor
</a>


<a href="/admin/analytics">
📊 Analytics
</a>


<a href="/admin/notifications">
🔔 Notifications
</a>


<a href="/admin/leaderboard">
🏆 Agent Leaderboard
</a>


<a href="/admin/download-report">
📄 Download PDF
</a>
 
<a href="/admin/system-stats">

<button style="
background:#0ea5e9;
color:white;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
">

⚙ System Statistics

</button>

</a>


</div>


</div>


</body>
<div style="
margin-bottom:30px;
text-align:center;
">


<a href="/admin/users">

<button>
👥 Manage Users
</button>

</a>


<a href="/admin/workflows">

<button>
⚙ Workflow Monitor
</button>

</a>


<a href="/admin/activity">

<button>
📋 Activity Logs
</button>

</a>


<a href="/admin/analytics">

<button>
📊 Analytics
</button>

</a>


<a href="/admin/download-report">

<button>
📄 Download Report
</button>

</a>


<a href="/admin/logout">

<button style="
background:#dc2626;
">

🚪 Logout

</button>

</a>


</div>

</html>
