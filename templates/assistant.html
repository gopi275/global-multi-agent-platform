<!DOCTYPE html>
<html>

<head>

<title>AI Assistant</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-top:15px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.answer{
    margin-top:20px;
    background:#334155;
    padding:20px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🤖 AI Assistant</h1>

<form action="/ask_ai" method="POST">

<input
type="text"
name="question"
placeholder="Ask something..."
required
>

<button type="submit">
Ask AI
</button>

</form>

{% if answer %}

<div class="answer">

{{ answer }}

</div>

{% endif %}

</div>

</div>

</body>

</html>
