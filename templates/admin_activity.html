<!DOCTYPE html>
<html>

<head>

<title>Admin Activity Logs</title>

<style>

body{

background:#020617;
color:white;
font-family:Segoe UI;
padding:30px;

}


.container{

max-width:1000px;
margin:auto;

}


h1{

text-align:center;
margin-bottom:30px;

}


table{

width:100%;
background:#1e293b;
border-radius:15px;
overflow:hidden;

}


th{

background:#2563eb;
padding:15px;

}


td{

padding:15px;
border-bottom:1px solid #334155;

}


tr:hover{

background:#334155;

}


.back{

display:inline-block;
margin-top:30px;
background:#2563eb;
padding:12px 25px;
color:white;
text-decoration:none;
border-radius:10px;

}


</style>


</head>


<body>


<div class="container">


<h1>
📋 Admin Activity Logs
</h1>



<table>


<tr>

<th>
Action
</th>

<th>
User
</th>

<th>
Date
</th>


</tr>



{% for log in logs %}


<tr>

<td>
{{log.action}}
</td>


<td>
{{log.user}}
</td>


<td>
{{log.date}}
</td>


</tr>


{% endfor %}



</table>



<a class="back" href="/admin">
⬅ Back To Dashboard
</a>



</div>


</body>

</html>
