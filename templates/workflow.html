<!DOCTYPE html>
<html>

<head>

<title>Workflow Center</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.card h3{
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.workflow-btn{
    display:block;
    width:300px;
    margin:40px auto;
    text-align:center;
    padding:15px;
    background:#22c55e;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.back{
    display:inline-block;
    margin-top:30px;
    padding:12px 20px;
    background:#64748b;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>⚙ AI Workflow Center</h1>

<div class="cards">

    <div class="card">
        <h3>🔍 Research Agent</h3>
        <a href="/run_research" class="btn">
            Run Agent
        </a>
    </div>

    <div class="card">
        <h3>💻 Coding Agent</h3>
        <a href="/run_coding" class="btn">
            Run Agent
        </a>
    </div>

    <div class="card">
        <h3>🧪 Testing Agent</h3>
        <a href="/run_testing" class="btn">
            Run Agent
        </a>
    </div>

    <div class="card">
        <h3>📄 Report Agent</h3>
        <a href="/run_report" class="btn">
            Run Agent
        </a>
    </div>
    <br>
</div>
<center>
<a href="/admin/run-full-workflow" class="btn">
    🚀 Run Complete Workflow
</a>
</center>

<center>

<a href="/dashboard" class="back">
⬅ Back To Dashboard
</a>

</center>

</div>

</body>

</html>
